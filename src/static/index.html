<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="auth-container">
        <h3>Student Login / Register</h3>
        <div id="user-info" class="hidden"></div>
        <form id="auth-form">
          <div class="form-group">
            <label for="auth-email">Email:</label>
            <input type="email" id="auth-email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="auth-password">Password:</label>
            <input type="password" id="auth-password" required placeholder="Choose a password" />
          </div>
          <button type="submit" id="auth-button">Login</button>
          <button type="button" id="toggle-auth-mode">Switch to Register</button>
        </form>
      </section>

      <section id="admin-container" class="hidden">
        <h3>Admin Activity Management</h3>
        <form id="create-activity-form">
          <div class="form-group">
            <label for="activity-name">Activity Name:</label>
            <input type="text" id="activity-name" required placeholder="Club or event name" />
          </div>
          <div class="form-group">
            <label for="activity-description">Description:</label>
            <textarea id="activity-description" required placeholder="Enter a short description"></textarea>
          </div>
          <div class="form-group">
            <label for="activity-schedule">Schedule:</label>
            <input type="text" id="activity-schedule" required placeholder="Days and times" />
          </div>
          <div class="form-group">
            <label for="activity-max">Max Participants:</label>
            <input type="number" id="activity-max" required min="1" placeholder="Maximum participants" />
          </div>
          <button type="submit">Create Activity</button>
        </form>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
